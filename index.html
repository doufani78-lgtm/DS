<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>دوف سبورت – بث مباشر مباريات اليوم | Dof Sport</title>
    <meta name="description" content="دوف سبورت – منصتك الأولى لمشاهدة مباريات اليوم بث مباشر مجاناً. جميع البطولات الكبرى بجودة عالية." />
    <meta name="theme-color" content="#da251d" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-dark: #333333;
            --text-gray: #777777;
            --red-main: #da251d;
            --red-dark: #c62828;
            --btn-tomorrow: #8d6e63;
            --btn-yesterday: #0d47a1;
            --border-color: #e5e5e5;
            --shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .dark {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --text-dark: #e0e0e0;
            --text-gray: #aaa;
            --border-color: #2a2a4a;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            direction: rtl;
            line-height: 1.5;
            transition: background-color 0.3s, color 0.3s;
        }

        /* الشريط العلوي (Navbar) */
        .navbar {
            background: #ffffff;
            padding: 0 20px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e5e5e5;
        }
        .dark .navbar {
            background: #0f3460;
            border-bottom: 1px solid #1a1a4a;
        }

        .navbar-brand .logo {
            background: var(--red-main);
            color: #ffffff;
            font-weight: 900;
            font-size: 22px;
            padding: 8px 24px;
            border-radius: 6px;
            text-decoration: none;
            display: block;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .social-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .social-icon.yt { background: #ff0000; }
        .social-icon.tw { background: #1da1f2; }
        .social-icon.fb { background: #4267b2; }
        .social-icon.wa { background: #25d366; }
        .social-icon.tg { background: #0088cc; }

        .dark-toggle {
            background: var(--red-main);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .dark-toggle:hover { background: var(--red-dark); }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        /* شريط الفلاتر الرئيسي */
        .filter-group-left {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .filter-btn {
            border: none;
            border-radius: 6px;
            padding: 8px 20px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            color: #fff;
            transition: opacity 0.2s, transform 0.1s;
        }
        .filter-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-tomorrow { background: var(--btn-tomorrow); }
        .btn-today { background: var(--red-main); }
        .btn-yesterday { background: var(--btn-yesterday); }
        .btn-important {
            background: var(--red-main);
            padding: 8px 25px;
        }

        /* شريط الفلاتر الإضافية */
        .filters-row {
            background: #ffffff;
            border-radius: 12px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .dark .filters-row { background: var(--card-bg); }

        .filters-row input,
        .filters-row select {
            padding: 8px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: #fff;
            color: var(--text-dark);
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .dark .filters-row input,
        .dark .filters-row select {
            background: #1a1a2e;
            border-color: #2a2a4a;
            color: #eee;
        }
        .filters-row input:focus,
        .filters-row select:focus {
            border-color: var(--red-main);
            outline: none;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            font-weight: 600;
        }

        .reset-btn {
            background: #64748b;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .reset-btn:hover { background: #475569; }

        /* بطاقات المباريات */
        .matches-grid { display: flex; flex-direction: column; gap: 16px; }
        
        .match-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
            border: 1px solid var(--border-color);
            transition: border-color 0.2s;
        }
        .match-card.live {
            border-color: #22c55e;
        }

        .match-content {
            padding: 20px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .team-info {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            position: relative;
        }

        .team-logo {
            width: 35px;
            height: 35px;
            object-fit: contain;
            margin-bottom: 4px;
            border-radius: 50%;
            background: #fff;
        }

        .sound-icon {
            height: 24px;
            display: flex;
            align-items: flex-end;
            gap: 3px;
            margin-bottom: 4px;
            opacity: 0.6;
        }
        .sound-icon span {
            background: #999;
            width: 4px;
            display: inline-block;
            border-radius: 2px;
        }
        .sound-icon span:nth-child(1) { height: 12px; }
        .sound-icon span:nth-child(2) { height: 18px; }
        .sound-icon span:nth-child(3) { height: 8px; }

        .team-name {
            font-weight: 800;
            font-size: 16px;
            color: var(--text-dark);
        }

        .match-center {
            flex: 1.5;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .score {
            font-size: 22px;
            font-weight: 900;
            color: #111;
            letter-spacing: 1px;
        }
        .dark .score { color: #eee; }
        .score.live { color: #16a34a; }

        .match-time {
            font-weight: 700;
            font-size: 16px;
            color: var(--text-dark);
            margin: 2px 0;
        }

        .status-badge {
            background: #444;
            color: #fff;
            padding: 4px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 6px;
        }
        .status-badge.live { background: #dc2626; }

        .match-footer {
            background: #f9f9f9;
            border-top: 1px solid #e0e0e0;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 8px 10px;
            font-size: 13px;
            color: #666;
            text-align: center;
            font-weight: 600;
        }
        .dark .match-footer {
            background: #1a1a2e;
            border-top: 1px solid #2a2a4a;
            color: #aaa;
        }

        /* طبقة التشغيل */
        .play-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .match-card:hover .play-overlay { opacity: 1; }
        .play-overlay.disabled {
            pointer-events: none;
            opacity: 0 !important;
        }
        .play-icon {
            width: 50px; height: 50px;
            background: var(--red-main);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 22px;
        }

        /* زر العودة للأعلى */
        .scroll-top-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 45px;
            height: 45px;
            border-radius: 8px;
            background: var(--red-main);
            color: #fff;
            border: none;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.25);
            display: none;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            z-index: 999;
        }
        .scroll-top-btn:hover { background: var(--red-dark); transform: translateY(-3px); }

        /* الفوتر */
        .site-footer {
            background: #ffffff;
            border-top: 1px solid var(--border-color);
            padding: 20px;
            margin-top: 30px;
            text-align: center;
            color: var(--text-gray);
            font-size: 14px;
            transition: background 0.3s, color 0.3s;
        }
        .dark .site-footer {
            background: #0f3460;
            color: #aaa;
            border-top: 1px solid #1a1a4a;
        }
        .site-footer strong {
            color: var(--red-main);
            font-size: 16px;
            display: block;
            margin-bottom: 5px;
        }
        .footer-links {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .footer-links a {
            color: var(--text-gray);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }
        .footer-links a:hover {
            color: var(--red-main);
        }

        @media(max-width: 768px) {
            .navbar { flex-wrap: wrap; height: auto; padding: 15px; gap: 15px; justify-content: center; }
            .navbar-links { order: 3; width: 100%; justify-content: center; gap: 15px; font-size: 14px; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .filter-group-left { justify-content: center; }
            .btn-important { width: 100%; text-align: center; }
            .filters-row { flex-direction: column; align-items: stretch; }
            .filters-row input, .filters-row select { width: 100%; }
        }
        @media(max-width: 480px) {
            .match-content { flex-direction: column; gap: 15px; }
            .team-logo { width: 30px; height: 30px; }
            .match-footer { grid-template-columns: 1fr; gap: 5px; }
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="navbar-brand">
        <a href="#" class="logo">DofSport</a>
    </div>
    <div class="navbar-actions">
        <button class="dark-toggle" id="darkModeToggle" title="الوضع الليلي">🌙</button>
    </div>
</header>

<main class="container">
    <div class="filters-row">
        <input type="text" id="searchInput" placeholder="🔍 ابحث عن فريق أو دوري..." style="flex:2; min-width:180px;">
        <select id="leagueFilterSelect" style="flex:1; min-width:150px;">
            <option value="">كل الدوريات</option>
        </select>
        <label class="checkbox-label">
            <input type="checkbox" id="liveOnlyCheck"> المباشر فقط
        </label>
        <select id="timezoneSelect" style="min-width:150px;">
            <option value="auto">تلقائي (حسب جهازك)</option>
            <option value="0">جرينتش GMT+0</option>
            <option value="1">الجزائر / تونس GMT+1</option>
            <option value="2">القاهرة GMT+2</option>
            <option value="3">الرياض / بغداد GMT+3</option>
        </select>
        <button class="reset-btn" id="resetFiltersBtn">إعادة ضبط</button>
    </div>

    <div id="matchesContainer" class="matches-grid"></div>
    <div id="loadingMsg" style="text-align:center;padding:60px;color:var(--text-gray);">⏳ جاري التحميل...</div>
    <div id="errorMsg" style="display:none;text-align:center;padding:60px;color:var(--red-main);">⚠️ تعذر تحميل المباريات</div>

</main>

<footer class="site-footer">
    <div class="footer-content">
        <strong>⚽ Dof Sport – بث مباشر مباريات اليوم</strong>
        <small>جميع الحقوق محفوظة © 2026</small>
        <div class="footer-links">
            <a href="#">من نحن</a>
            <a href="#">سياسة الخصوصية</a>
            <a href="#">اتصل بنا</a>
        </div>
    </div>
</footer>

<button class="scroll-top-btn" id="scrollTopBtn" title="العودة للأعلى">↑</button>

<script>
(function() {
    const API = 'https://ws.kora-api.space/';
    const TEAM_IMG = 'https://cdn.kora-api.space/uploads/team/';
    const STREAM_PROXY = 'https://strm01.app/';
    const FALLBACK_IMG = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 70"%3E%3Crect fill="%23e2e8f0" width="70" height="70" rx="8"/%3E%3Ctext x="50%25" y="55%25" text-anchor="middle" dominant-baseline="middle" font-size="28"%3E⚽%3C/text%3E%3C/svg%3E';

    const container = document.getElementById('matchesContainer');
    const loadingEl = document.getElementById('loadingMsg');
    const errorEl = document.getElementById('errorMsg');
    let gmtTimesMap = new Map();

    function getDateOffset(days) {
        const d = new Date();
        d.setDate(d.getDate() + days);
        return d.toISOString().split('T')[0];
    }
    window.getDateOffset = getDateOffset;

    function ts() {
        const d = new Date();
        return `${d.getFullYear()}${(d.getMonth()+1+'').padStart(2,'0')}${(d.getDate()+'').padStart(2,'0')}${(d.getHours()+'').padStart(2,'0')}${(d.getMinutes()+'').padStart(2,'0')}`;
    }

    function isValidRedirectUrl(url) {
        if (!url || !url.trim()) return false;
        const trimmed = url.trim();
        return /^https?:\/\//i.test(trimmed) && !/\.(exe|dll|bat|sh|ps1|apk|dmg)$/i.test(trimmed);
    }

    function statusInfo(s) {
        const map = {
            '1': { cls: 'live', text: 'مباشر 🔴' },
            '2': { cls: 'finished', text: 'انتهت المباراة' },
            '3': { cls: 'upcoming', text: 'قريباً' },
            '0': { cls: 'upcoming', text: 'لم تبدأ' }
        };
        return map[s] || map['0'];
    }

    function buildCard(m) {
        const st = statusInfo(m.status);
        const [homeScore, awayScore] = (m.score && m.score !== '-') ? m.score.split(' - ') : ['-', '-'];
        
        const homeTeam = m.home_ar || m.home_en || 'الفريق الأول';
        const awayTeam = m.away_ar || m.away_en || 'الفريق الثاني';
        const leagueName = m.league_ar || m.league_en || 'دوري';
        
        // تعديل اسم القناة لتجنب تكرار اسم الفريق
        let channelText = (m.channels && m.channels.length > 0) ? m.channels[0].name : 'غير معروف';
        if (channelText === homeTeam || channelText === awayTeam) {
            channelText = '⚡ Dof Sport HD';
        }

        const liveClass = m.status == '1' ? ' live' : '';

        // روابط البث
        let streamUrl = '';
        const redirect = isValidRedirectUrl(m.redirect_url) ? m.redirect_url.trim() : null;
        if (redirect) {
            streamUrl = redirect;
        } else if (m.active == 1 && m.has_channels == 1) {
            streamUrl = `${STREAM_PROXY}?m=${m.id}&lang=ar`;
        }

        const target = streamUrl ? 'target="_blank" rel="noopener"' : '';
        const href = streamUrl || '#';
        const overlayClass = streamUrl ? 'play-overlay' : 'play-overlay disabled';

        const gmtTime = m.time || '--:--';

        return `
        <div class="match-card${liveClass}" data-status="${m.status}" data-league="${leagueName}" data-gmt="${gmtTime}">
            <div class="match-content">
                <div class="team-info">
                    <div class="sound-icon">
                        <span></span><span></span><span></span>
                    </div>
                    <img src="${m.home_logo ? TEAM_IMG + m.home_logo : FALLBACK_IMG}" 
                         alt="${homeTeam}" 
                         class="team-logo" 
                         loading="lazy"
                         onerror="this.src='${FALLBACK_IMG}'">
                    <div class="team-name">${homeTeam}</div>
                </div>
                <div class="match-center">
                    <div class="score${m.status=='1'?' live':''}">${homeScore} - ${awayScore}</div>
                    <div class="match-time" data-gmt="${gmtTime}">${gmtTime}</div>
                    <div class="status-badge ${st.cls}">${st.text}</div>
                </div>
                <div class="team-info">
                    <div class="sound-icon">
                        <span></span><span></span><span></span>
                    </div>
                    <img src="${m.away_logo ? TEAM_IMG + m.away_logo : FALLBACK_IMG}" 
                         alt="${awayTeam}" 
                         class="team-logo" 
                         loading="lazy"
                         onerror="this.src='${FALLBACK_IMG}'">
                    <div class="team-name">${awayTeam}</div>
                </div>
            </div>
            <div class="match-footer">
                <div class="league-info">${leagueName}</div>
                <div class="source-info">⚡ Dof Sport</div>
                <div class="channel-info">${channelText}</div>
            </div>
            <a href="${href}" class="${overlayClass}" ${target}>
                <div class="play-icon">${streamUrl ? '▶' : '🚫'}</div>
            </a>
        </div>`;
    }

    function renderMatches(matches) {
        container.innerHTML = matches.map(buildCard).join('');
        collectGMTTimes();
        applyTimezone();
        populateLeagueFilter();
        applyFilters();
    }

    function collectGMTTimes() {
        gmtTimesMap.clear();
        container.querySelectorAll('.match-time').forEach(el => {
            const t = el.getAttribute('data-gmt');
            if (t && /\d{2}:\d{2}/.test(t)) gmtTimesMap.set(el, t);
        });
    }

    function applyTimezone() {
        let stored = localStorage.getItem('dof_tz_offset') || 'auto';
        let offset;
        if (stored === 'auto') {
            offset = -new Date().getTimezoneOffset() / 60;
        } else {
            offset = parseFloat(stored);
            if (isNaN(offset)) offset = 0;
        }
        gmtTimesMap.forEach((gmt, el) => {
            const [h, m] = gmt.split(':').map(Number);
            const totalMinutes = h * 60 + m + Math.round(offset * 60);
            let nh = Math.floor(totalMinutes / 60);
            const nm = totalMinutes % 60;
            if (nh >= 24) nh -= 24;
            else if (nh < 0) nh += 24;
            el.textContent = `${(nh+'').padStart(2,'0')}:${(nm+'').padStart(2,'0')}`;
        });
    }

    function populateLeagueFilter() {
        const leagues = new Set();
        container.querySelectorAll('.match-card').forEach(c => {
            const league = c.dataset.league;
            if (league) leagues.add(league);
        });
        const sel = document.getElementById('leagueFilterSelect');
        sel.innerHTML = '<option value="">كل الدوريات</option>';
        [...leagues].sort().forEach(l => {
            sel.innerHTML += `<option value="${l}">${l}</option>`;
        });
    }

    function applyFilters() {
        const search = document.getElementById('searchInput').value.toLowerCase().trim();
        const liveOnly = document.getElementById('liveOnlyCheck').checked;
        const league = document.getElementById('leagueFilterSelect').value;
        container.querySelectorAll('.match-card').forEach(card => {
            let show = true;
            if (search && !card.innerText.toLowerCase().includes(search)) show = false;
            if (liveOnly && !card.classList.contains('live')) show = false;
            if (league && card.dataset.league !== league) show = false;
            card.style.display = show ? '' : 'none';
        });
    }

    async function loadMatches(date) {
        loadingEl.style.display = 'block';
        errorEl.style.display = 'none';
        container.innerHTML = '';
        try {
            const res = await fetch(`${API}api/matches/${date}/ar?t=${ts()}`);
            if (!res.ok) throw new Error('فشل');
            const data = await res.json();
            const allMatches = data.matches || [];
            
            if (!allMatches.length) {
                loadingEl.innerHTML = '😴 لا توجد مباريات في هذا التاريخ.';
                return;
            }
            renderMatches(allMatches);
            loadingEl.style.display = 'none';
        } catch (e) {
            loadingEl.style.display = 'none';
            errorEl.style.display = 'block';
        }
    }

    function initTimezone() {
        const select = document.getElementById('timezoneSelect');
        let stored = localStorage.getItem('dof_tz_offset');
        if (!stored) {
            stored = 'auto';
            localStorage.setItem('dof_tz_offset', 'auto');
        }
        if (stored === 'auto') {
            select.value = 'auto';
        } else {
            if (!select.querySelector(`option[value="${stored}"]`)) {
                const option = document.createElement('option');
                option.value = stored;
                const num = parseFloat(stored);
                option.textContent = `GMT${num >= 0 ? '+' + num : num} (مخصص)`;
                select.appendChild(option);
            }
            select.value = stored;
        }
    }

    // ---- ربط الأحداث ----
    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('liveOnlyCheck').addEventListener('change', applyFilters);
    document.getElementById('leagueFilterSelect').addEventListener('change', applyFilters);
    document.getElementById('resetFiltersBtn').addEventListener('click', () => {
        document.getElementById('searchInput').value = '';
        document.getElementById('liveOnlyCheck').checked = false;
        document.getElementById('leagueFilterSelect').value = '';
        applyFilters();
    });
    document.getElementById('timezoneSelect').addEventListener('change', function() {
        localStorage.setItem('dof_tz_offset', this.value);
        applyTimezone();
    });

    // الوضع الليلي
    const darkToggle = document.getElementById('darkModeToggle');
    const updateDarkIcon = () => {
        darkToggle.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
    };
    darkToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        updateDarkIcon();
        localStorage.setItem('dof_dark_mode', document.body.classList.contains('dark') ? '1' : '0');
    });
    if (localStorage.getItem('dof_dark_mode') === '1') {
        document.body.classList.add('dark');
    }
    updateDarkIcon();

    // العودة للأعلى
    const scrollBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => {
        scrollBtn.style.display = window.scrollY > 300 ? 'flex' : 'none';
    });
    scrollBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // بدء التشغيل
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
            initTimezone();
            loadMatches(getDateOffset(0));
        });
    } else {
        initTimezone();
        loadMatches(getDateOffset(0));
    }
})();
</script>
</body>
</html>
